<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Scoreboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --accent: #e8b44f;
      --live: #ff4444;
      --final: #888;
      --check: #4caf50;
      --row-h: 56px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 15px;
      padding-bottom: 0;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px env(safe-area-inset-top, 0);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .count-badge {
      background: var(--accent);
      color: #000;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 12px;
    }

    form { width: 100%; }

    .league-section {
      margin-top: 20px;
    }

    .league-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 16px 4px;
    }

    .game-list {
      border-top: 1px solid var(--border);
    }

    .game-row {
      display: flex;
      align-items: center;
      min-height: var(--row-h);
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(255,255,255,0.05);
      transition: background 0.1s;
    }

    .game-row:active { background: #222; }

    .game-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      accent-color: var(--check);
      cursor: pointer;
    }

    .game-info {
      flex: 1;
      padding: 0 12px;
    }

    .matchup {
      font-size: 16px;
      font-weight: 600;
    }

    .game-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.live {
      background: var(--live);
      box-shadow: 0 0 6px var(--live);
      animation: pulse 1.5s infinite;
    }

    .status-dot.final { background: var(--final); }
    .status-dot.upcoming { background: transparent; border: 1px solid var(--muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .score-display {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: right;
    }

    .score-display .team-score {
      display: inline-block;
      width: 22px;
      text-align: center;
    }

    .score-display .sep { color: var(--muted); margin: 0 2px; }

    .no-games {
      text-align: center;
      color: var(--muted);
      padding: 48px 16px;
      font-size: 14px;
    }

    .no-games strong { display: block; font-size: 18px; color: var(--text); margin-bottom: 8px; }

    .submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px env(safe-area-inset-bottom, 12px);
      background: var(--bg);
      border-top: 1px solid var(--border);
      z-index: 10;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    .submit-btn {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .submit-btn:active { opacity: 0.85; }

    .next-btn {
      background: #2a2a2a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .next-btn:active { background: #333; }

    .auto-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .auto-btn.on  { background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; }
    .auto-btn.off { background: #3a1a1a; color: #ff5555; border: 1px solid #5a2d2d; }

    .refresh-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      padding: 0;
    }

    .utility-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 6px;
    }

    .utility-btn {
      background: none;
      border: none;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }

    .utility-btn.refresh { color: var(--muted); }
    .utility-btn.reset   { color: #cc4444; }
  </style>
</head>
<body>

<header>
  <h1>Scoreboard Picker</h1>
  <span class="count-badge">{{ selected_count }} selected</span>
</header>

<form method="POST" action="/select">

{% if not grouped %}
  <div class="no-games">
    <strong>No games today</strong>
    Check back later or <a href="/refresh" style="color:var(--accent)">refresh</a>
  </div>
{% endif %}

{% for league, games in grouped.items() %}
<div class="league-section">
  <div class="league-header">{{ 'WORLD CUP' if league == 'WC' else league }}</div>
  <div class="game-list">
    {% for game in games %}
    <label class="game-row">
      <input type="checkbox" name="game_id" value="{{ game.id }}"
             {% if game.id in selected %}checked{% endif %}>

      <div class="game-info">
        <div class="matchup">{{ game.at }} @ {{ game.ht }}</div>
        <div class="game-meta">{{ game.st }}</div>
      </div>

      {% if game.live == 1 %}
        <div class="score-display">
          <span class="team-score">{{ game.as }}</span>
          <span class="sep">-</span>
          <span class="team-score">{{ game.hs }}</span>
        </div>
        <div class="status-dot live" style="margin-left:10px"></div>
      {% elif game.live == 2 %}
        <div class="score-display" style="color:var(--final)">
          <span class="team-score">{{ game.as }}</span>
          <span class="sep">-</span>
          <span class="team-score">{{ game.hs }}</span>
        </div>
        <div class="status-dot final" style="margin-left:10px"></div>
      {% else %}
        <div class="status-dot upcoming" style="margin-left:10px"></div>
      {% endif %}
    </label>
    {% endfor %}
  </div>
</div>
{% endfor %}

<div style="height:260px" aria-hidden="true"></div>

<div class="submit-bar">
  <button type="button" id="autoBtn"
          class="auto-btn {{ 'on' if auto_scroll else 'off' }}"
          onclick="toggleAuto()">
    AUTO-SCROLL: {{ 'ON' if auto_scroll else 'OFF' }}
  </button>
  <div class="btn-row">
    <button type="submit" class="submit-btn">Update Board</button>
    <button type="button" class="next-btn" onclick="fetch('/next',{method:'POST'})">&#9654;</button>
  </div>
  <div class="utility-row">
    <button class="utility-btn refresh" id="refreshBtn" onclick="forceRefresh()">Refresh scores</button>
    <button class="utility-btn reset"   id="resetBtn"   onclick="resetBoard()">Reset board</button>
  </div>
</div>

<script>
function forceRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = 'Refreshing...';
  fetch('/refresh')
    .then(() => { btn.textContent = 'Refreshed!'; })
    .then(() => setTimeout(() => { btn.textContent = 'Refresh scores'; }, 2000));
}

function resetBoard() {
  const btn = document.getElementById('resetBtn');
  btn.textContent = 'Resetting…';
  fetch('/reset-board', {method: 'POST'})
    .then(() => { btn.textContent = 'Done!'; })
    .then(() => setTimeout(() => { btn.textContent = 'Reset board'; }, 3000));
}

function toggleAuto() {
  fetch('/autoscroll', {method: 'POST'})
    .then(r => r.json())
    .then(data => {
      const btn = document.getElementById('autoBtn');
      btn.className = 'auto-btn ' + (data.auto ? 'on' : 'off');
      btn.textContent = 'AUTO-SCROLL: ' + (data.auto ? 'ON' : 'OFF');
    });
}
</script>

</form>
</body>
</html>
